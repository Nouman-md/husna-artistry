<main class="checkout-page">
  <div class="checkout-grid">
    <form id="checkoutForm" class="checkout-form">
      <h2 class="section-title checkout-title">Delivery Address</h2>

      <div class="form-row">
        <label>Full Name
          <input type="text" name="fullName" required>
        </label>
        <label>Mobile Number
          <input type="tel" name="mobile" required pattern="[0-9]{10,15}" placeholder="10-digit mobile number">
        </label>
      </div>
      <label>Email (optional, for order updates)
        <input type="email" name="email">
      </label>
      <div class="form-row">
        <label>House / Flat No.
          <input type="text" name="houseNo" required>
        </label>
        <label>Street
          <input type="text" name="street" required>
        </label>
      </div>
      <div class="form-row">
        <label>Area
          <input type="text" name="area">
        </label>
        <label>Landmark
          <input type="text" name="landmark">
        </label>
      </div>
      <div class="form-row">
        <label>City
          <input type="text" name="city" required>
        </label>
        <label>State
          <input type="text" name="state" required>
        </label>
      </div>
      <div class="form-row">
        <label>PIN Code
          <input type="text" name="pincode" required pattern="[0-9]{4,10}">
        </label>
        <label>Address Type
          <select name="addressType">
            <option value="Home">Home</option>
            <option value="Work">Work</option>
          </select>
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="payNowBtn">Pay Now</button>
      <p class="checkout-secure-note">🔒 Payments are securely processed by Razorpay. We never see or store your card details.</p>
    </form>

    <aside class="order-summary">
      <h3>Order Summary</h3>
      <div id="summaryItems" class="summary-items"></div>
      <div class="summary-row">
        <span>Items Total</span>
        <span id="summaryItemsTotal">₹0</span>
      </div>
      <div class="summary-row">
        <span>Delivery Charges</span>
        <span id="summaryDelivery">Free</span>
      </div>
      <div class="summary-row summary-total">
        <span>Total Amount</span>
        <span id="summaryTotal">₹0</span>
      </div>
    </aside>
  </div>
