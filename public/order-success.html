<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed | Husna Artistry</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<section class="order-success-page">
  <svg width="64" height="64" viewBox="0 0 24 24" class="success-check"><circle cx="12" cy="12" r="10" fill="none" stroke="#C9A961" stroke-width="1.6"/><path d="M7 12.5l3 3 7-7" fill="none" stroke="#C9A961" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <h1>Order Confirmed</h1>
  <p>Thank you! Your payment was successful and your order has been placed.</p>
  <p class="order-id-line">Order ID: <strong id="orderIdDisplay">—</strong></p>
  <p class="success-note">We'll reach out on WhatsApp or email to confirm delivery details. You can also track this order from <a href="/index.html#" id="viewAccountLink">My Account</a> if you're logged in.</p>
  <a href="/index.html" class="btn btn-primary">Continue Shopping</a>
</section>
<script>
  const params = new URLSearchParams(window.location.search);
  const orderId = params.get("orderId");
  if (orderId) document.getElementById("orderIdDisplay").textContent = orderId;
</script>
</body>
</html>
